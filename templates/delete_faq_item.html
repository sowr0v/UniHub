<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Delete FAQ</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
        .navbar { background: #dc2626; color: white; padding: 15px 30px; display: flex; justify-content: space-between; }
        .navbar a { color: white; text-decoration: none; }
        .container { max-width: 560px; margin: 28px auto; padding: 0 20px; }
        .card { background: white; padding: 26px; border-radius: 10px; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-right: 8px; }
        .danger { background: #dc2626; color: white; }
        .sec { background: #e5e5e5; text-decoration: none; color: #333; display: inline-block; }
    </style>
</head>
<body>
    <nav class="navbar"><strong>Delete FAQ</strong><a href="{% url 'custom_admin:manage_faq' %}">← Back</a></nav>
    <div class="container">
        <div class="card">
            <p>Remove this question?</p>
            <p style="margin:10px 0; color:#444;"><em>{{ item.question }}</em></p>
            <form method="post">{% csrf_token %}
                <button type="submit" class="btn danger">Delete</button>
                <a href="{% url 'custom_admin:manage_faq' %}" class="btn sec">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
