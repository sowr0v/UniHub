<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Uni-Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #7b83eb, #5a64d8); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header h2 { color: #4a54c4; font-size: 1.8rem; margin-bottom: 0.5rem; }
        .login-header p { color: #666; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #333; font-weight: 500; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
        .form-group input:focus { border-color: #5a64d8; outline: none; }
        .helptext { font-size: 0.75rem; color: #888; display: block; margin-top: 5px; }
        .btn-submit { width: 100%; padding: 12px; background: #5a64d8; color: white; border: none; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 1rem; }
        .btn-submit:hover { background: #4a54c4; }
        .login-link { display: block; text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #5a64d8; text-decoration: none; }
        .error-messages { background: #ffe6e6; color: #cc0000; padding: 10px; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h2>Join Uni-Hub</h2>
            <p>Create your student account</p>
        </div>

        {% if messages %}
            <div class="error-messages">
                {% for message in messages %} {{ message }} {% endfor %}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'authentication:register' %}">
            {% csrf_token %}
            <div class="form-group">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn-submit">Sign Up</button>
        </form>

        <a href="{% url 'authentication:login' %}" class="login-link">Already have an account? Log in here.</a>
    </div>

</body>
</html>
